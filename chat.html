<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminescent.io — Chat</title>
  <meta name="description" content="Your AI-powered team conversation workspace.">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- ========= BACKGROUND ORBS ========= -->
  <div class="bg-orbs">
    <div class="bg-orb bg-orb--cyan" style="opacity: 0.06;"></div>
    <div class="bg-orb bg-orb--purple" style="opacity: 0.06;"></div>
  </div>

  <!-- ========= SIDEBAR OVERLAY (MOBILE) ========= -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ========= CHAT APP LAYOUT ========= -->
  <div class="chat-app" id="chatApp">

    <!-- ========= LEFT SIDEBAR ========= -->
    <aside class="chat-sidebar" id="chatSidebar">

      <!-- ========= SIDEBAR HEADER ========= -->
      <div class="chat-sidebar-header">
        <span class="chat-sidebar-dot"></span>
        <span class="chat-sidebar-logo">Luminescent.io</span>
      </div>

      <!-- ========= SIDEBAR MODE TABS ========= -->
      <div class="sidebar-tabs" id="sidebarTabs">
        <button class="sidebar-tab active" id="tabChat" data-mode="chat">
          💬 Chat
        </button>
        <button class="sidebar-tab" id="tabImageGen" data-mode="image">
          🎨 Image Gen
        </button>
      </div>

      <!-- ========= NEW CONVERSATION BUTTON ========= -->
      <button class="new-convo-btn" id="newConvoBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span>New Conversation</span>
      </button>

      <!-- ========= RECENT CHATS ========= -->
      <div class="sidebar-section-label">Recent Chats</div>
      <div class="recent-chats-list" id="recentChatsList">
        <!-- Populated dynamically -->
      </div>

      <!-- ========= SETTINGS ========= -->
      <div class="sidebar-settings" id="sidebarSettings">
        <div class="settings-label">Settings</div>

        <div class="settings-group">
          <label for="systemPrompt">System Prompt</label>
          <textarea
            class="settings-textarea"
            id="systemPrompt"
            rows="3"
            placeholder="Customize AI behavior..."
          >You are Luminescent AI, a helpful and intelligent assistant. Provide clear, concise, and accurate responses.</textarea>
        </div>

        <div class="settings-group">
          <label for="aiModelSelect">AI Model</label>
          <select class="settings-select" id="aiModelSelect">
            <option value="claude-haiku-4-5-20251001" selected>Luminescent Fast (Haiku)</option>
            <option value="claude-sonnet-4-6">Luminescent Pro (Sonnet)</option>
          </select>
        </div>

        <!-- Usage indicator -->
        <div class="settings-group" id="usageGroup" style="margin-top:8px;">
          <label>Monthly Usage</label>
          <div id="usageBar" style="
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            height: 6px;
            margin-top: 6px;
            overflow: hidden;
          ">
            <div id="usageFill" style="
              height: 100%;
              background: var(--cyan);
              border-radius: 99px;
              width: 0%;
              transition: width 0.4s ease;
            "></div>
          </div>
          <div id="usageLabel" style="font-size:11px;color:var(--text-muted);margin-top:4px;text-align:right;">
            — / — messages
          </div>
        </div>
      </div>

    </aside>

    <!-- ========= MAIN CHAT AREA ========= -->
    <main class="chat-main" id="chatMain">

      <!-- ========= CHAT HEADER ========= -->
      <header class="chat-header" id="chatHeader">
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>

        <span class="chat-header-title" id="chatTitle">New Conversation</span>

        <div class="chat-header-actions">
          <button class="chat-header-btn" id="topbarChatToggle" title="Chat mode" style="color: var(--cyan);">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </button>
          <button class="chat-header-btn" id="topbarImageToggle" title="Image generation">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <button class="chat-header-btn" id="logoutBtn" title="Logout" style="margin-left: 4px;">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <!-- ========= CHAT THREAD ========= -->
      <div class="chat-thread" id="chatThread"></div>

      <!-- ========= TYPING INDICATOR ========= -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="message-avatar message-avatar--bot" style="width:28px;height:28px;font-size:11px;">L</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;color:var(--text-muted);font-style:italic;">Luminescent is thinking</span>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- ========= CHAT INPUT AREA ========= -->
      <div class="chat-input-area" id="chatInputArea">
        <div class="chat-input-wrapper" id="chatInputWrapper">
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Message Luminescent AI…"
            rows="1"
            autofocus
          ></textarea>
          <button class="chat-send-btn" id="chatSendBtn" disabled aria-label="Send message">
            <svg viewBox="0 0 24 24">
              <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
          </button>
        </div>
      </div>

    </main>
  </div>

  <!-- ========= SCRIPTS ========= -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/auth.js?v=4"></script>
  <script src="assets/js/chat.js?v=4"></script>

  <!-- ──────────────────────────────────────────────────────
       REAL AI OVERRIDE
       chat.js defines handleSendMessage() with dummy responses.
       We redefine it here (after chat.js loads) so every call
       goes to the real /api/chat serverless function instead.
  ────────────────────────────────────────────────────────── -->
  <script>
    /**
     * Override the dummy handleSendMessage from chat.js with a real
     * Anthropic API call via the Vercel serverless function at /api/chat.
     *
     * Falls back to a helpful error message when the API is unreachable
     * (e.g. running locally without the serverless function).
     */
    handleSendMessage = async function realAIHandler(userText) {
      if (!userText || !userText.trim()) return;

      /* 1 — Add user message to UI + history */
      addMessage('user', userText.trim());
      showTypingIndicator();

      const systemPrompt = document.getElementById('systemPrompt')?.value?.trim()
        || 'You are Luminescent AI, a helpful and intelligent team assistant.';

      const model = document.getElementById('aiModelSelect')?.value
        || 'claude-haiku-4-5-20251001';

      /* 2 — Build message history for context (skip the greeting) */
      const contextMessages = (currentMessages || [])
        .filter(m => !(m.role === 'bot' && currentMessages.indexOf(m) === 0))
        .map(m => ({
          role:    m.role === 'bot' ? 'assistant' : 'user',
          content: m.text || ''
        }));

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: contextMessages, systemPrompt, model })
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || `API error ${res.status}`);
        }

        const data = await res.json();
        hideTypingIndicator();
        addMessage('bot', data.reply || 'No response from AI.');

      } catch (err) {
        hideTypingIndicator();

        /* Friendly error: distinguish network vs API key issue */
        const isLocal = window.location.hostname === 'localhost'
          || window.location.hostname === '127.0.0.1';

        const errMsg = isLocal
          ? `AI not available locally.\n\nDeploy to Vercel and set ANTHROPIC_API_KEY in your environment variables to enable real AI responses.\n\nError: ${err.message}`
          : `Could not reach the AI service. Please try again in a moment.\n\nDetails: ${err.message}`;

        addMessage('bot', errMsg);
      }

      /* 3 — Persist conversation */
      saveConversation();

      /* 4 — Update usage display */
      updateUsageDisplay();
    };

    /**
     * Reads message count from localStorage and updates the usage bar.
     * Real quota enforcement happens server-side; this is just a visual hint.
     */
    function updateUsageDisplay() {
      try {
        const convs = JSON.parse(localStorage.getItem('lum_conversations') || '[]');
        const total = convs.reduce((acc, c) => acc + (c.messages?.length || 0), 0);
        /* Assume starter plan 500 msg limit for display; real limit from DB */
        const limit = 500;
        const pct   = Math.min(Math.round((total / limit) * 100), 100);

        const fill  = document.getElementById('usageFill');
        const label = document.getElementById('usageLabel');
        if (fill)  fill.style.width = pct + '%';
        if (fill)  fill.style.background = pct > 80 ? '#ff6de1' : 'var(--cyan)';
        if (label) label.textContent = `${total} messages used`;
      } catch (_) { /* non-critical */ }
    }
  </script>

  <!-- ──────────────────────────────────────────────────────
       CHAT PAGE CONTROLLER
  ────────────────────────────────────────────────────────── -->
  <script>
    document.addEventListener('DOMContentLoaded', async function initChatPage() {
      await initSupabase();

      /* Auth guard */
      redirectIfGuest();
      if (!isLoggedIn()) return;

      const session = await getSession() || getSyncSession();
      if (!session) return;

      /* Greeting */
      const userName = session.name ? session.name.split(' ')[0] : 'there';
      addMessage('bot', `Welcome back, ${userName}! I'm Luminescent AI. How can I help your team today?`);

      /* Sidebar chats + usage */
      renderRecentChats();
      updateUsageDisplay();

      /* ── Input ── */
      const chatInput = document.getElementById('chatInput');
      const sendBtn   = document.getElementById('chatSendBtn');

      chatInput.addEventListener('input', function() {
        sendBtn.disabled = !chatInput.value.trim();
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 180) + 'px';
      });

      chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (chatInput.value.trim()) sendMessage();
        }
      });

      sendBtn.addEventListener('click', function() {
        if (chatInput.value.trim()) sendMessage();
      });

      function sendMessage() {
        const text = chatInput.value;
        chatInput.value = '';
        chatInput.style.height = 'auto';
        sendBtn.disabled = true;
        handleSendMessage(text); /* calls our real AI override above */
      }

      /* ── New conversation ── */
      document.getElementById('newConvoBtn').addEventListener('click', newConversation);

      /* ── Image gen tabs (placeholder) ── */
      document.getElementById('tabImageGen').addEventListener('click', () =>
        showToast('Image Generation coming soon!', 'info'));
      document.getElementById('topbarImageToggle').addEventListener('click', () =>
        showToast('Image Generation coming soon!', 'info'));

      /* ── Mobile sidebar ── */
      const mobileBtn     = document.getElementById('mobileMenuBtn');
      const overlay       = document.getElementById('sidebarOverlay');
      const chatSidebar   = document.getElementById('chatSidebar');

      mobileBtn.addEventListener('click', () => {
        chatSidebar.classList.add('mobile-open');
        overlay.classList.add('active');
      });
      overlay.addEventListener('click', closeMobileSidebar);

      /* ── Logout ── */
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    });
  </script>
</body>
</html>
