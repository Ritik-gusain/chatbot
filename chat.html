<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminescent.io — Chat</title>
  <meta name="description" content="Your AI-powered conversation workspace. Chat with Luminescent AI.">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- ========= BACKGROUND ORBS ========= -->
  <div class="bg-orbs">
    <div class="bg-orb bg-orb--cyan" style="opacity: 0.06;"></div>
    <div class="bg-orb bg-orb--purple" style="opacity: 0.06;"></div>
  </div>

  <!-- ========= SIDEBAR OVERLAY (MOBILE) ========= -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ========= CHAT APP LAYOUT ========= -->
  <div class="chat-app" id="chatApp">

    <!-- ========= LEFT SIDEBAR ========= -->
    <aside class="chat-sidebar" id="chatSidebar">

      <!-- ========= SIDEBAR HEADER ========= -->
      <div class="chat-sidebar-header">
        <span class="chat-sidebar-dot"></span>
        <span class="chat-sidebar-logo">Luminescent.io</span>
      </div>

      <!-- ========= SIDEBAR MODE TABS ========= -->
      <div class="sidebar-tabs" id="sidebarTabs">
        <button class="sidebar-tab active" id="tabChat" data-mode="chat">
          💬 Chat
        </button>
        <button class="sidebar-tab" id="tabImageGen" data-mode="image">
          🎨 Image Gen
        </button>
      </div>

      <!-- ========= NEW CONVERSATION BUTTON ========= -->
      <button class="new-convo-btn" id="newConvoBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span>New Conversation</span>
      </button>

      <!-- ========= RECENT CHATS ========= -->
      <div class="sidebar-section-label">Recent Chats</div>
      <div class="recent-chats-list" id="recentChatsList">
        <!-- Populated dynamically by chat.js -->
      </div>

      <!-- ========= SETTINGS ========= -->
      <div class="sidebar-settings" id="sidebarSettings">
        <div class="settings-label">Settings</div>

        <div class="settings-group">
          <label for="systemPrompt">System Prompt</label>
          <textarea
            class="settings-textarea"
            id="systemPrompt"
            rows="3"
            placeholder="Customize AI behavior..."
          >You are Luminescent AI, a helpful and intelligent assistant. Provide clear, concise, and accurate responses.</textarea>
        </div>

        <div class="settings-group">
          <label for="aiModelSelect">AI Model</label>
          <select class="settings-select" id="aiModelSelect">
            <option value="luminescent-v1" selected>Luminescent v1 (Default)</option>
            <option value="luminescent-v2">Luminescent v2 (Fast)</option>
            <option value="luminescent-pro">Luminescent Pro</option>
          </select>
        </div>
      </div>

    </aside>

    <!-- ========= MAIN CHAT AREA ========= -->
    <main class="chat-main" id="chatMain">

      <!-- ========= CHAT HEADER ========= -->
      <header class="chat-header" id="chatHeader">
        <!-- Mobile menu toggle -->
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>

        <span class="chat-header-title" id="chatTitle">New Conversation</span>

        <div class="chat-header-actions">
          <!-- Chat / Image toggle (topbar) -->
          <button class="chat-header-btn" id="topbarChatToggle" title="Chat mode" style="color: var(--cyan);">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </button>
          <button class="chat-header-btn" id="topbarImageToggle" title="Image generation">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>

          <!-- Logout -->
          <button class="chat-header-btn" id="logoutBtn" title="Logout" style="margin-left: 4px;">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <!-- ========= CHAT THREAD ========= -->
      <div class="chat-thread" id="chatThread">
        <!-- Messages are dynamically injected by chat.js -->
      </div>

      <!-- ========= TYPING INDICATOR ========= -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="message-avatar message-avatar--bot" style="width:28px;height:28px;font-size:11px;">L</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;color:var(--text-muted);font-style:italic;">Luminescent is thinking</span>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- ========= CHAT INPUT AREA ========= -->
      <div class="chat-input-area" id="chatInputArea">
        <div class="chat-input-wrapper" id="chatInputWrapper">
          <textarea
            class="chat-input"
            id="chatInput"
            placeholder="Message Luminescent AI..."
            rows="1"
            autofocus
          ></textarea>
          <button class="chat-send-btn" id="chatSendBtn" disabled aria-label="Send message">
            <svg viewBox="0 0 24 24">
              <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
          </button>
        </div>
      </div>

    </main>
  </div>

  <!-- ========= SCRIPTS ========= -->
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/chat.js"></script>
  <script>
    /**
     * =========================================================
     *  Chat Page Controller
     *  Initializes the chat UI, handles events, guards auth
     * =========================================================
     */

    document.addEventListener('DOMContentLoaded', function initChatPage() {
      /* Guard: redirect to login if not authenticated */
      redirectIfGuest();

      /* If we passed the guard, initialize */
      if (!isLoggedIn()) return;

      const session = getSession();

      /* Show greeting as first bot message */
      const userName = session.name.split(' ')[0];
      addMessage('bot', `Welcome back, ${userName}! I'm Luminescent AI. How can I help you today?`);

      /* Render recent chats in sidebar */
      renderRecentChats();

      /* ---- Input handling ---- */
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('chatSendBtn');

      /**
       * Auto-resize the textarea as user types.
       */
      chatInput.addEventListener('input', function handleInputResize() {
        /* Enable/disable send button */
        sendBtn.disabled = !chatInput.value.trim();

        /* Auto-grow textarea */
        chatInput.style.height = 'auto';
        const maxHeight = 180;
        chatInput.style.height = Math.min(chatInput.scrollHeight, maxHeight) + 'px';
      });

      /**
       * Send message on Enter (without Shift).
       */
      chatInput.addEventListener('keydown', function handleEnterKey(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          if (chatInput.value.trim()) {
            sendMessage();
          }
        }
      });

      /**
       * Send button click handler.
       */
      sendBtn.addEventListener('click', function handleSendClick() {
        if (chatInput.value.trim()) {
          sendMessage();
        }
      });

      /**
       * Sends the current input as a user message.
       * @returns {void}
       */
      function sendMessage() {
        const messageText = chatInput.value;
        chatInput.value = '';
        chatInput.style.height = 'auto';
        sendBtn.disabled = true;
        handleSendMessage(messageText);
      }

      /* ---- New Conversation button ---- */
      document.getElementById('newConvoBtn').addEventListener('click', function() {
        newConversation();
      });

      /* ---- Sidebar tab switching ---- */
      const tabChat = document.getElementById('tabChat');
      const tabImageGen = document.getElementById('tabImageGen');

      tabImageGen.addEventListener('click', function() {
        showToast('Image Generation is coming soon!', 'info');
      });

      /* ---- Topbar mode toggles ---- */
      document.getElementById('topbarImageToggle').addEventListener('click', function() {
        showToast('Image Generation is coming soon!', 'info');
      });

      /* ---- Mobile sidebar ---- */
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const sidebarOverlay = document.getElementById('sidebarOverlay');
      const chatSidebar = document.getElementById('chatSidebar');

      mobileMenuBtn.addEventListener('click', function openMobileSidebar() {
        chatSidebar.classList.add('mobile-open');
        sidebarOverlay.classList.add('active');
      });

      sidebarOverlay.addEventListener('click', function() {
        closeMobileSidebar();
      });

      /* ---- Logout ---- */
      document.getElementById('logoutBtn').addEventListener('click', function handleLogoutClick() {
        handleLogout();
      });
    });
  </script>
</body>
</html>
