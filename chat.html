<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace — Luminescent.io</title>
  <meta name="description" content="Your Luminescent.io AI workspace. Powerful conversations and data analysis.">
  
  <!-- Google Fonts: Inter (body) + Space Grotesk (display) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  
  <!-- Lucide Icons -->
</head>
<body>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      --text-primary: #f0f0f5;
      --text-secondary: #b0b0bf;
      --text-muted: #7a7a8e;
      --cyan: #00f5ff;
      --violet: #b66dff;
      --pink: #ff6de1;
      --bg-dark: #0a0b14;
      --bg-overlay: rgba(15, 16, 30, 0.7);
      --border: rgba(180, 109, 255, 0.2);
      
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
      background: linear-gradient(135deg, #0a0b14 0%, #12131f 50%, #0f1220 100%);
      min-height: 100vh;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }

    #workspace {
      display: flex;
      height: 100vh;
      gap: 0;
    }

    /* ──────── SIDEBAR ──────── */
    #sidebar {
      width: 280px;
      background: var(--bg-overlay);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
      z-index: 10;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #sidebar::-webkit-scrollbar {
      width: 6px;
    }
    #sidebar::-webkit-scrollbar-track {
      background: transparent;
    }
    #sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    #sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      font-family: 'Space Grotesk', sans-serif;
      background: linear-gradient(135deg, var(--cyan), var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .new-chat-btn {
      margin: 12px 12px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(180, 109, 255, 0.1), rgba(0, 245, 255, 0.05));
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 8px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .new-chat-btn:hover {
      background: linear-gradient(135deg, rgba(180, 109, 255, 0.15), rgba(0, 245, 255, 0.1));
      border-color: rgba(0, 245, 255, 0.5);
      transform: translateY(-1px);
    }

    .chat-list { flex: 1; padding: 8px 8px; }
    .chat-item {
      padding: 10px 12px;
      margin-bottom: 4px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item:hover {
      background: rgba(0, 245, 255, 0.05);
      border-color: rgba(0, 245, 255, 0.2);
      color: var(--text-primary);
    }

    .chat-item.active {
      background: rgba(180, 109, 255, 0.1);
      border-color: var(--violet);
      color: var(--cyan);
    }

    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
    .logout-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: rgba(255, 109, 225, 0.1);
      border-color: var(--pink);
      color: var(--pink);
    }

    /* ──────── MAIN AREA ──────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      padding: 0 20px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 11, 20, 0.4);
    }

    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .hamburger-btn { display: none; width: 32px; height: 32px; background: transparent; border: none; color: var(--text-primary); cursor: pointer; font-size: 18px; }

    .model-selector {
      padding: 6px 12px;
      background: linear-gradient(135deg, rgba(180, 109, 255, 0.05), rgba(0, 245, 255, 0.05));
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .model-selector:hover {
      border-color: var(--violet);
      background: linear-gradient(135deg, rgba(180, 109, 255, 0.1), rgba(0, 245, 255, 0.08));
    }

    .usage-meter {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .usage-meter-bar {
      width: 60px;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .usage-meter-fill {
      height: 100%;
      background: var(--cyan);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .usage-meter.warning .usage-meter-fill { background: var(--pink); }

    .top-bar-right { display: flex; align-items: center; gap: 12px; }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .icon-btn:hover { color: var(--cyan); }
    .icon-btn.active { color: var(--cyan); }

    /* ──────── CHAT AREA ──────── */
    #chatArea {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    #chatArea::-webkit-scrollbar {
      width: 6px;
    }
    #chatArea::-webkit-scrollbar-track {
      background: transparent;
    }
    #chatArea::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    #chatArea::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { justify-content: flex-end; }
    .message.bot { justify-content: flex-start; }

    .message-bubble {
      max-width: 70%;
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.6;
      word-wrap: break-word;
      font-size: 14px;
    }

    .message.user .message-bubble {
      background: linear-gradient(135deg, rgba(180, 109, 255, 0.2), rgba(0, 245, 255, 0.1));
      border: 1px solid rgba(0, 245, 255, 0.3);
      color: var(--text-primary);
    }

    .message.bot .message-bubble {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.08), rgba(180, 109, 255, 0.05));
      border: 1px solid rgba(180, 109, 255, 0.2);
      color: var(--text-primary);
    }

    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    /* ──────── INPUT AREA ──────── */
    #inputArea {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: rgba(10, 11, 20, 0.4);
      display: flex;
      gap: 8px;
    }

    #messageInput {
      flex: 1;
      min-height: 40px;
      padding: 10px 14px;
      background: linear-gradient(135deg, rgba(180, 109, 255, 0.05), rgba(0, 245, 255, 0.05));
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      transition: all 0.2s ease;
    }

    #messageInput:focus {
      outline: none;
      border-color: var(--violet);
      background: linear-gradient(135deg, rgba(180, 109, 255, 0.1), rgba(0, 245, 255, 0.08));
      box-shadow: 0 0 20px rgba(182, 109, 255, 0.1);
    }

    #messageInput::placeholder {
      color: var(--text-muted);
    }

    #sendBtn {
      width: 40px;
      height: 40px;
      padding: 0;
      background: linear-gradient(135deg, var(--violet), var(--cyan));
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    #sendBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(182, 109, 255, 0.3);
    }

    #sendBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ──────── MOBILE (≤768px) ──────── */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      #sidebar.mobile-open {
        transform: translateX(0);
      }

      .sidebar-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        opacity: 0;
        pointer-events: none;
        z-index: 99;
        transition: opacity 0.3s ease;
      }

      .sidebar-overlay.active {
        opacity: 1;
        pointer-events: all;
      }

      .hamburger-btn { display: inline-flex; }

      .message-bubble { max-width: 85%; }
    }
  </style>

  <div id="workspace">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">Luminescent</span>
      </div>
      <button class="new-chat-btn" id="newChatBtn">
        <span>✨</span> New Chat
      </button>
      <div class="chat-list" id="chatList"></div>
      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </aside>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- MAIN -->
    <div id="main">
      <!-- TOP BAR -->
      <div class="top-bar">
        <div class="top-bar-left">
          <button class="hamburger-btn" id="hamburgerBtn">☰</button>
          <select class="model-selector" id="modelSelect">
            <option value="haiku">Luminescent Fast</option>
            <option value="sonnet" selected>Luminescent Pro</option>
          </select>
        </div>
        <div class="top-bar-right">
          <div class="usage-meter" id="usageMeter">
            <div class="usage-meter-bar">
              <div class="usage-meter-fill" id="usageFill" style="width: 0%"></div>
            </div>
            <span id="usageText">0/1000</span>
          </div>
          <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
        </div>
      </div>

      <!-- CHAT AREA -->
      <div id="chatArea"></div>

      <!-- INPUT AREA -->
      <div id="inputArea">
        <textarea id="messageInput" placeholder="Message Luminescent AI…" rows="1"></textarea>
        <button id="sendBtn" disabled title="Send message">
          <span style="font-size: 18px;">⬆️</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ========= SCRIPTS ========= -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/auth.js?v=4"></script>
  <script src="assets/js/chat.js?v=4"></script>

  <!-- ──────────────────────────────────────────────────────
       REAL AI OVERRIDE
  ────────────────────────────────────────────────────────── -->
  <script>
    let currentMessages = [];
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatArea = document.getElementById('chatArea');
    const logoutBtn = document.getElementById('logoutBtn');
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    function addMessage(role, text) {
      const msg = { role, text };
      currentMessages.push(msg);

      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      saveChatHistory();
    }

    function escapeHtml(text) {
      const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    function showTypingIndicator() {
      const div = document.createElement('div');
      div.id = 'typing-indicator';
      div.innerHTML = '<div style="display:flex;gap:4px;"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTypingIndicator() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function saveChatHistory() {
      localStorage.setItem('lum_history', JSON.stringify(currentMessages));
    }

    async function handleSendMessage(userText) {
      if (!userText || !userText.trim()) return;

      addMessage('user', userText.trim());
      showTypingIndicator();

      const systemPrompt = 'You are Luminescent AI, a helpful team assistant.';
      const model = document.getElementById('modelSelect').value || 'sonnet';

      const contextMessages = currentMessages
        .filter(m => !(m.role === 'bot' && currentMessages.indexOf(m) === 0))
        .map(m => ({
          role: m.role === 'bot' ? 'assistant' : 'user',
          content: m.text || ''
        }));

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: contextMessages, systemPrompt, model })
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || `API error ${res.status}`);
        }

        const data = await res.json();
        hideTypingIndicator();
        addMessage('bot', data.reply || 'No response.');

      } catch (err) {
        hideTypingIndicator();
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const errMsg = isLocal
          ? `Deploy to Vercel with ANTHROPIC_API_KEY to enable real AI responses.\n\nError: ${err.message}`
          : `Could not reach AI service. Please try again.\n\nDetails: ${err.message}`;
        addMessage('bot', errMsg);
      }
    }

    // Events
    messageInput.addEventListener('input', function() {
      sendBtn.disabled = !messageInput.value.trim();
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    });

    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (messageInput.value.trim()) {
          const text = messageInput.value;
          messageInput.value = '';
          messageInput.style.height = 'auto';
          sendBtn.disabled = true;
          handleSendMessage(text);
        }
      }
    });

    sendBtn.addEventListener('click', function() {
      if (messageInput.value.trim()) {
        const text = messageInput.value;
        messageInput.value = '';
        messageInput.style.height = 'auto';
        sendBtn.disabled = true;
        handleSendMessage(text);
      }
    });

    logoutBtn.addEventListener('click', async () => {
      if (window.supabase) {
        await supabase.auth.signOut();
      }
      window.location.href = 'login.html';
    });

    hamburgerBtn.addEventListener('click', () => {
      sidebar.classList.add('mobile-open');
      sidebarOverlay.classList.add('active');
    });

    sidebarOverlay.addEventListener('click', () => {
      sidebar.classList.remove('mobile-open');
      sidebarOverlay.classList.remove('active');
    });

    // Init
    document.addEventListener('DOMContentLoaded', async () => {
      await initSupabase();
      redirectIfGuest();
      if (!isLoggedIn()) return;

      const session = await getSession() || getSyncSession();
      if (!session) return;

      const userName = session.name ? session.name.split(' ')[0] : 'there';
      addMessage('bot', `Welcome back, ${userName}! How can I help you today?`);

      const saved = localStorage.getItem('lum_history');
      if (saved) {
        currentMessages = JSON.parse(saved);
        currentMessages.forEach(m => {
          const div = document.createElement('div');
          div.className = `message ${m.role}`;
          div.innerHTML = `<div class="message-bubble">${escapeHtml(m.text)}</div>`;
          chatArea.appendChild(div);
        });
      }
    });
  </script>
</body>
</html>
