<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luminescent.io — Login</title>
  <meta name="description" content="Sign in or create your Luminescent.io account to access the AI chatbot.">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    /* ── Inline load-error banner (replaces the alert) ── */
    .load-error {
      display: none;
      position: fixed;
      inset: 0;
      background: #04050f;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #f0f0f5;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .load-error.visible { display: flex; }
    .load-error h2 { font-size: 18px; color: #ff6de1; }
    .load-error p { font-size: 13px; color: #555570; max-width: 340px; line-height: 1.6; }
    .load-error button {
      padding: 10px 24px;
      border: 1px solid rgba(0,245,255,0.4);
      background: transparent;
      color: #00f5ff;
      border-radius: 99px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- ========= LOAD ERROR BANNER (replaces ugly alert) ========= -->
  <div class="load-error" id="loadError">
    <h2>⚠ Failed to Load</h2>
    <p id="loadErrorMsg">Could not initialize Luminescent. Check your internet connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
    <a href="index.html" style="font-size:13px;color:#555570;">← Back to Home</a>
  </div>

  <!-- ========= STARFIELD BACKGROUND ========= -->
  <canvas id="starfield"></canvas>

  <!-- ========= BACKGROUND ORBS ========= -->
  <div class="bg-orbs">
    <div class="bg-orb bg-orb--cyan"></div>
    <div class="bg-orb bg-orb--purple"></div>
    <div class="bg-orb bg-orb--pink"></div>
  </div>

  <!-- ========= BACK LINK ========= -->
  <a href="index.html" class="auth-back-link" id="backToHome">
    ← Back to Home
  </a>

  <!-- ========= AUTH PAGE ========= -->
  <div class="auth-page" id="authPage">
    <div class="glass-card auth-card" id="authCard">

      <!-- ========= AUTH LOGO ========= -->
      <div class="auth-logo">
        <span class="logo-dot"></span>
        Luminescent.io
      </div>

      <!-- ========= AUTH TABS ========= -->
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" id="tabLogin" data-tab="login">Login</button>
        <button class="auth-tab" id="tabRegister" data-tab="register">Register</button>
      </div>

      <!-- ========= LOGIN FORM ========= -->
      <form class="auth-form" id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
          <span class="form-error" id="loginEmailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
          <span class="form-error" id="loginPasswordError"></span>
        </div>

        <button type="submit" class="btn-primary" id="loginSubmitBtn" style="width: 100%; margin-top: 4px;">
          Sign In
        </button>

        <div class="auth-divider">or</div>

        <!-- Google SVG defined once, reused below -->
        <button type="button" class="btn-google" id="googleLoginBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </form>

      <!-- ========= REGISTER FORM ========= -->
      <form class="auth-form" id="registerForm" style="display: none;" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="registerName">Full Name</label>
          <input type="text" class="form-input" id="registerName" placeholder="Jane Doe" required autocomplete="name">
          <span class="form-error" id="registerNameError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="registerEmail">Email</label>
          <input type="email" class="form-input" id="registerEmail" placeholder="you@example.com" required autocomplete="email">
          <span class="form-error" id="registerEmailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="registerPassword">Password</label>
          <input type="password" class="form-input" id="registerPassword" placeholder="••••••••" required autocomplete="new-password" minlength="6">
          <span class="form-error" id="registerPasswordError"></span>
        </div>

        <button type="submit" class="btn-primary" id="registerSubmitBtn" style="width: 100%; margin-top: 4px;">
          Create Account
        </button>

        <div class="auth-divider">or</div>

        <button type="button" class="btn-google" id="googleRegisterBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </form>

      <!-- ========= OTP VERIFICATION ========= -->
      <div class="otp-section" id="otpSection">
        <label class="form-label" style="text-align: center; display: block; margin-bottom: 16px;">
          Enter the 6-digit code sent to your email
        </label>
        <div class="otp-input-wrapper" id="otpInputWrapper">
          <input type="text" class="otp-digit" maxlength="1" data-index="0" id="otpDigit0" inputmode="numeric" autocomplete="one-time-code">
          <input type="text" class="otp-digit" maxlength="1" data-index="1" id="otpDigit1" inputmode="numeric">
          <input type="text" class="otp-digit" maxlength="1" data-index="2" id="otpDigit2" inputmode="numeric">
          <input type="text" class="otp-digit" maxlength="1" data-index="3" id="otpDigit3" inputmode="numeric">
          <input type="text" class="otp-digit" maxlength="1" data-index="4" id="otpDigit4" inputmode="numeric">
          <input type="text" class="otp-digit" maxlength="1" data-index="5" id="otpDigit5" inputmode="numeric">
        </div>
        <span class="form-error" id="otpError" style="text-align: center; display: block; margin-top: 8px;"></span>

        <button type="button" class="btn-primary" id="verifyOtpBtn" style="width: 100%; margin-top: 16px;">
          Verify &amp; Continue
        </button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/auth.js?v=4"></script>
  <script>
    /**
     * =========================================================
     *  Login Page Controller — Luminescent.io
     *  Bugs fixed vs previous version:
     *   1. window.supabaseClient → supabase (variable name mismatch)
     *   2. alert() → inline load-error banner
     *   3. Google OAuth wired to Supabase signInWithOAuth
     *   4. try/catch wraps ALL init code, not just first 3 lines
     * =========================================================
     */

    let pendingUserEmail = null;

    document.addEventListener('DOMContentLoaded', async function initLoginPage() {
      try {
        /* ── 1. Init ── */
        await initSupabase();
        initStarfield();
        redirectIfLoggedIn();

        /* ── 2. Check URL params for plan/mode ── */
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode');
        const plan = params.get('plan');

        if (plan) {
          /* Store chosen plan for post-signup flow */
          sessionStorage.setItem('pendingPlan', plan);
        }
        if (mode === 'register') {
          switchTab('register');
        }

        /* ── 3. Wire everything up ── */
        setupTabs();
        setupForms();
        setupOTPInputs();
        setupGoogleButtons();

      } catch (err) {
        console.error('Luminescent init error:', err);
        /* Show friendly inline banner instead of blocking alert */
        const banner = document.getElementById('loadError');
        const msg    = document.getElementById('loadErrorMsg');
        if (msg) msg.textContent = err.message || 'Could not load the page.';
        if (banner) banner.classList.add('visible');
      }
    });

    /* ──────────────────────────────────────────
       TAB SWITCHING
    ────────────────────────────────────────── */
    function setupTabs() {
      document.getElementById('tabLogin').addEventListener('click',    () => switchTab('login'));
      document.getElementById('tabRegister').addEventListener('click', () => switchTab('register'));
    }

    function switchTab(tabName) {
      const isLogin = tabName === 'login';

      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      document.getElementById('loginForm').style.display    = isLogin ? 'flex' : 'none';
      document.getElementById('registerForm').style.display = isLogin ? 'none' : 'flex';
      document.getElementById('otpSection').classList.remove('active');

      pendingUserEmail = null;
      clearAllErrors();
    }

    /* ──────────────────────────────────────────
       FORMS
    ────────────────────────────────────────── */
    function setupForms() {
      /* ─── Login ─── */
      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        clearAllErrors();

        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        let hasError   = false;

        if (!email || !isValidEmail(email)) {
          showFieldError('loginEmailError', 'Enter a valid email address');
          hasError = true;
        }
        if (!password) {
          showFieldError('loginPasswordError', 'Password is required');
          hasError = true;
        }
        if (hasError) return;

        const btn = document.getElementById('loginSubmitBtn');
        btn.textContent = 'Signing in…';
        btn.disabled = true;

        /* FIX: was window.supabaseClient — correct variable is `supabase` from auth.js */
        if (!supabase) {
          showToast('Supabase not initialized. Check your API key.', 'error');
          btn.textContent = 'Sign In';
          btn.disabled = false;
          return;
        }

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        btn.textContent = 'Sign In';
        btn.disabled = false;

        if (error) {
          showToast(error.message, 'error');
        } else {
          showToast('Welcome back!', 'success');
          setTimeout(() => { window.location.href = 'chat.html'; }, 700);
        }
      });

      /* ─── Register ─── */
      document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        clearAllErrors();

        const name     = document.getElementById('registerName').value.trim();
        const email    = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        let hasError   = false;

        if (!name) {
          showFieldError('registerNameError', 'Full name is required');
          hasError = true;
        }
        if (!email || !isValidEmail(email)) {
          showFieldError('registerEmailError', 'Enter a valid email address');
          hasError = true;
        }
        if (!password || password.length < 6) {
          showFieldError('registerPasswordError', 'Password must be at least 6 characters');
          hasError = true;
        }
        if (hasError) return;

        const btn = document.getElementById('registerSubmitBtn');
        btn.textContent = 'Creating account…';
        btn.disabled = true;

        /* FIX: was window.supabaseClient */
        if (!supabase) {
          showToast('Supabase not initialized. Check your API key.', 'error');
          btn.textContent = 'Create Account';
          btn.disabled = false;
          return;
        }

        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: { data: { full_name: name } }
        });

        btn.textContent = 'Create Account';
        btn.disabled = false;

        if (error) {
          showToast(error.message, 'error');
          return;
        }

        if (data.session) {
          showToast('Account created! Welcome to Luminescent.', 'success');
          setTimeout(() => { window.location.href = 'chat.html'; }, 700);
        } else {
          /* Email confirmation required — show OTP flow */
          pendingUserEmail = email;
          initiateOTPVerification();
        }
      });
    }

    /* ──────────────────────────────────────────
       OTP VERIFICATION
    ────────────────────────────────────────── */
    function initiateOTPVerification() {
      document.getElementById('loginForm').style.display    = 'none';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('authTabs').style.display     = 'none';
      document.getElementById('otpSection').classList.add('active');
      document.getElementById('otpDigit0').focus();
      showToast('Check your email for the 6-digit code.', 'success');
    }

    function setupOTPInputs() {
      const digits = document.querySelectorAll('.otp-digit');

      digits.forEach(function(input, i) {
        /* Allow digits only; auto-advance */
        input.addEventListener('input', function(e) {
          e.target.value = e.target.value.replace(/[^0-9]/g, '');
          if (e.target.value && i < 5) digits[i + 1].focus();
        });

        /* Backspace: go back */
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && !e.target.value && i > 0) digits[i - 1].focus();
          if (e.key === 'Enter') verifyOTP();
        });

        /* Paste full code */
        input.addEventListener('paste', function(e) {
          e.preventDefault();
          const code = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
          code.split('').forEach((ch, idx) => { if (digits[idx]) digits[idx].value = ch; });
          digits[Math.min(code.length, 5)].focus();
        });
      });

      document.getElementById('verifyOtpBtn').addEventListener('click', verifyOTP);
    }

    async function verifyOTP() {
      const digits = document.querySelectorAll('.otp-digit');
      const code   = Array.from(digits).map(d => d.value).join('');
      const errEl  = document.getElementById('otpError');

      if (code.length !== 6) {
        errEl.textContent = 'Please enter all 6 digits';
        return;
      }

      const btn = document.getElementById('verifyOtpBtn');
      btn.textContent = 'Verifying…';
      btn.disabled    = true;
      errEl.textContent = '';

      /* FIX: was window.supabaseClient */
      const { error } = await supabase.auth.verifyOtp({
        email: pendingUserEmail,
        token: code,
        type: 'signup'
      });

      btn.textContent = 'Verify & Continue';
      btn.disabled    = false;

      if (error) {
        errEl.textContent = error.message;
        showToast('Invalid code. Please try again.', 'error');
      } else {
        showToast('Verified! Welcome to Luminescent.', 'success');
        setTimeout(() => { window.location.href = 'chat.html'; }, 700);
      }
    }

    /* ──────────────────────────────────────────
       GOOGLE OAUTH — wired to Supabase
    ────────────────────────────────────────── */
    function setupGoogleButtons() {
      ['googleLoginBtn', 'googleRegisterBtn'].forEach(function(id) {
        document.getElementById(id)?.addEventListener('click', async function() {
          if (!supabase) {
            showToast('Auth not initialized', 'error');
            return;
          }
          /* FIX: was showing toast "coming soon" — now calls real OAuth */
          const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
              redirectTo: window.location.origin + '/chat.html'
            }
          });
          if (error) showToast(error.message, 'error');
        });
      });
    }

    /* ──────────────────────────────────────────
       HELPERS
    ────────────────────────────────────────── */
    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      if (el) el.textContent = msg;
    }

    function clearAllErrors() {
      document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; });
    }
  </script>
</body>
</html>
