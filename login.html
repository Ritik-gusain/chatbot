<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Luminescent Scholar - Sign In">
    <title>Sign In — Luminescent Scholar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    <style>
        :root {
            --bg-main: #0d0d0d;
            --bg-surface: #2a2a2a;
            --text-1: #ececf1;
            --text-2: #9a9aa6;
            --text-3: #6b7280;
            --accent: #10a37f;
            --border-1: rgba(255,255,255,0.08);
            --border-2: rgba(255,255,255,0.12);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font);
            background: var(--bg-main);
            color: var(--text-1);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
            color: var(--text-1);
            letter-spacing: -0.02em;
        }

        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-2);
            line-height: 1.5;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-1);
        }

        .form-input {
            padding: 10px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-2);
            border-radius: 8px;
            color: var(--text-1);
            font-family: var(--font);
            font-size: 14px;
            transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input::placeholder {
            color: var(--text-3);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-surface);
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1);
        }

        .form-input:hover {
            border-color: var(--border-1);
        }

        .form-remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-2);
        }

        .form-checkbox {
            width: 16px;
            height: 16px;
            border: 1px solid var(--border-2);
            border-radius: 4px;
            cursor: pointer;
            appearance: none;
            background: transparent;
            transition: all 150ms;
        }

        .form-checkbox:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .form-checkbox:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.2);
        }

        .login-btn {
            padding: 10px 16px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: all 150ms;
            margin-top: 8px;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-3);
            font-size: 13px;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-1);
        }

        .login-social {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-btn {
            padding: 10px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-2);
            border-radius: 8px;
            color: var(--text-1);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 150ms;
        }

        .social-btn:hover {
            background: linear-gradient(135deg, rgba(16, 163, 127, 0.08), rgba(16, 163, 127, 0.05));
            border-color: var(--accent);
        }

        .social-icon {
            font-size: 16px;
        }

        .login-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-2);
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-1);
        }

        .login-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 150ms;
        }

        .login-footer a:hover {
            opacity: 0.8;
        }

        .signup-link {
            text-align: center;
            font-size: 13px;
            margin-top: 16px;
            color: var(--text-2);
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .error-message {
            padding: 10px 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 13px;
            display: none;
            margin-bottom: 16px;
        }

        .error-message.show {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-3);
        }

        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
            }

            .login-title {
                font-size: 20px;
            }

            .social-btn {
                font-size: 12px;
                padding: 9px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">✨</div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to access your conversations and continue learning</p>
        </div>

        <form class="login-form" id="loginForm">
            <div class="error-message" id="errorMessage"></div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    class="form-input"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                />
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-input"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                />
            </div>

            <div class="form-remember">
                <input type="checkbox" id="remember" class="form-checkbox" />
                <label for="remember" style="cursor: pointer;">Keep me signed in</label>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="login-divider">or continue with</div>

        <div class="login-social">
            <button type="button" class="social-btn" onclick="handleSocialLogin('google')">
                <span class="social-icon">🔵</span>
                <span>Google</span>
            </button>
            <button type="button" class="social-btn" onclick="handleSocialLogin('github')">
                <span class="social-icon">⚫</span>
                <span>GitHub</span>
            </button>
        </div>

        <div class="login-footer">
            <a href="#forgot">Forgot your password?</a> · <a href="#terms">Terms of Service</a>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="#signup">Create one</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (!email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            // Simulate login
            try {
                const btn = loginForm.querySelector('.login-btn');
                btn.disabled = true;
                btn.textContent = 'Signing in...';

                // Simulate API call delay
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Mock successful login - redirect to chat
                window.location.href = 'index.html';
            } catch (error) {
                showError('An error occurred. Please try again.');
                const btn = loginForm.querySelector('.login-btn');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function handleSocialLogin(provider) {
            console.log(`Logging in with ${provider}`);
            // Simulate social login
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // Demo mode: auto-fill credentials
        if (location.search.includes('demo=true')) {
            document.getElementById('email').value = 'demo@example.com';
            document.getElementById('password').value = 'password123';
        }
    </script>
</body>
</html>
